{% extends 'base.html' %}

{% block title %}Log In{% endblock %}

{% block content %}
<h1>Log In</h1>
<p>Use either your email or your username to sign in.</p>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Log In</button>
</form>

<p><a href="{% url 'password_reset' %}">Forgot your password?</a></p>
<p>Need an account? <a href="{% url 'signup' %}">Create one here</a>.</p>
{% endblock %}
